services:
  webserver:
    image: webserver
    ports:
      - "4000:4000"
    user: "1000:1000"
    command: ["na", "/data"]
    environment:
      - PORT=4000
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - archive-cache:/app/.cache
      - logs:/app/logs
      - /path/to/files:/data

volumes:
  archive-cache:
  logs:
